[tool.ruff]
target-version = "py311"
line-length = 88
src = ["app", "tests"]
force-exclude = true
extend-exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
    "migrations/versions",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]
